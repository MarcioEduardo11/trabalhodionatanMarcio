<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcar Horario</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="agendamento">
    <div class="caixa-agendamento">
    <h1>Agende seu Corte</h1>
    <p>Preencha seus dados abaixo</p>
    
    <form>
        <label> Seu nome: </label><br>
        <input type="text" placeholder="Digite seu nome"><br><br>

        <label> Escolha o dia:</label><br>
        <input type="date"><br><br> 

        <label> Serviço:</label><br>
        <select>
            <option>Corte de cabelo</option>
            <option>Barba</option>
            <option>Sombrancelha</option>
            <option>Limpeza no Nariz</option>
        </select><br><br>
        <button type="submit" class="botao">Confirmar Agendamento</button>

        <br><br>
        <a href="index.html" style="color: rgb(0, 0, 0);">Voltar para o site</a>
    </form>
    </div>
</body>
</html>
